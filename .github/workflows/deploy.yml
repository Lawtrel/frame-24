name: Deploy API Docker

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build-and-push-api-image:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/frame-24-api:latest
            ghcr.io/${{ github.repository_owner }}/frame-24-api:${{ github.sha }}

  deploy-coolify:
    runs-on: ubuntu-latest
    needs: build-and-push-api-image
    env:
      COOLIFY_DEPLOY_WEBHOOK_URL: ${{ secrets.COOLIFY_DEPLOY_WEBHOOK_URL }}

    steps:
      - name: Trigger Coolify deploy webhook
        if: env.COOLIFY_DEPLOY_WEBHOOK_URL != ''
        run: |
          curl -fsSL -X POST "$COOLIFY_DEPLOY_WEBHOOK_URL"

  deploy-vps:
    runs-on: ubuntu-latest
    needs: build-and-push-api-image
    env:
      VPS_HOST: ${{ secrets.VPS_HOST }}
      VPS_USER: ${{ secrets.VPS_USER }}
      VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
      GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
      N8N_WEBHOOK_URL: ${{ secrets.N8N_WEBHOOK_URL }}

    steps:
      - name: Deploy stack on VPS using Docker Compose
        if: env.VPS_HOST != '' && env.VPS_USER != '' && env.VPS_SSH_KEY != '' && env.GHCR_USERNAME != '' && env.GHCR_TOKEN != ''
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ env.VPS_HOST }}
          username: ${{ env.VPS_USER }}
          key: ${{ env.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -euo pipefail
            cd ~/frame-24
            git pull origin main
            docker login ghcr.io -u "${{ env.GHCR_USERNAME }}" -p "${{ env.GHCR_TOKEN }}"

            docker compose --env-file .env.coolify -f docker-compose.coolify.yml pull api postgres minio

            docker compose --env-file .env.coolify -f docker-compose.coolify.yml up -d --remove-orphans

      - name: Notify failure
        if: failure() && env.N8N_WEBHOOK_URL != ''
        run: |
          curl -X POST "$N8N_WEBHOOK_URL" \
          -H "Content-Type: application/json" \
          -d '{"status":"error", "message":"Deploy Docker da API falhou no GitHub Actions."}'
