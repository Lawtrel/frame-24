name: Deploy Frame 24 to DigitalOcean

on:
  push:
    branches:
      - main  # Mude para 'master' se a sua branch principal tiver esse nome

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: 🚀 Conectar na VPS e Compilar
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            # Carrega o Node.js no ambiente SSH
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            # Trava de segurança de RAM
            export NODE_OPTIONS="--max-old-space-size=1024"
            
            cd ~/frame-24
            
            git pull origin main
            pnpm install
            
            # Se esse comando falhar, o GitHub cancela o resto do bloco na hora
            pnpm build
            
            # Gerencia o PM2
            pm2 describe frame24 > /dev/null
            # Compila o monorepo
            pnpm build
            
            # Atualiza e reinicia os serviços no PM2 usando o Ecosystem
            pm2 start ecosystem.config.js
            pm2 save

      - name: ✅ Notificar Sucesso no Discord
        if: success()
        run: |
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{"status":"success", "message":"Nova versão do Frame 24 compilada e online!"}'

      - name: ❌ Notificar Falha no Discord
        if: failure()
        run: |
          curl -X POST ${{ secrets.N8N_WEBHOOK_URL }} \
          -H "Content-Type: application/json" \
          -d '{"status":"error", "message":"O deploy falhou. O build quebrou ou a VPS ficou sem memória."}'