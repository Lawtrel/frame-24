name: Build and Deploy to Coolify

on:
  push:
    branches:
      - main # Dispara toda vez que você enviar código para a branch main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Permite que o GitHub Action salve a imagem no GHCR

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Login no GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Docker Buildx (Para otimização e cache)
        uses: docker/setup-buildx-action@v3

      - name: Build e Push da Imagem Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./dockerfile
          push: true
          tags: ghcr.io/lawtrel/frame-24-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Avisar o Coolify para fazer o Deploy
        run: |
          curl -k -X GET "${{ secrets.COOLIFY_WEBHOOK }}"
