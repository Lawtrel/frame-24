resolver 127.0.0.11 ipv6=off valid=10s;

upstream api_upstream {
  zone api_upstream 64k;
  server api:4000 resolve;
}

upstream web_upstream {
  zone web_upstream 64k;
  server web:3000 resolve;
}

upstream admin_upstream {
  zone admin_upstream 64k;
  server admin:3004 resolve;
}

upstream landing_upstream {
  zone landing_upstream 64k;
  server landing-page:3003 resolve;
}

upstream minio_upstream {
  zone minio_upstream 64k;
  server minio:9000 resolve;
}

# HTTP → HTTPS redirect + ACME challenge
server {
  listen 80 default_server;
  server_name _ lawtrel.dev *.lawtrel.dev 174.138.79.19;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}

# API subdomain - api.lawtrel.dev
server {
  listen 443 ssl;
  http2 on;
  server_name api.lawtrel.dev;

  ssl_certificate /etc/letsencrypt/live/lawtrel.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lawtrel.dev-0001/privkey.pem;

  client_max_body_size 50m;

  location / {
    proxy_pass http://api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}

