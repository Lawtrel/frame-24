# nginx-staging.conf
# Subdomínios de staging para a stack de preview em /opt/frame24-preview/.
# Copiado para /etc/nginx/conf.d/staging.conf no container frame24-nginx.
#
# A stack de preview deve mapear os containers com nomes:
#   - frame24-preview-api    -> :4000
#   - frame24-preview-web    -> :3000
#   - frame24-preview-admin  -> :3004
#
# Use variáveis de ambiente/override no docker-compose.prod.yml (preview)
# para renomear os containers. Veja .github/workflows/deploy-preview.yml.

resolver 127.0.0.11 ipv6=off valid=10s;

upstream staging_api_upstream {
  zone staging_api_upstream 64k;
  server frame24-preview-api:4000 resolve;
}

upstream staging_web_upstream {
  zone staging_web_upstream 64k;
  server frame24-preview-web:3000 resolve;
}

upstream staging_admin_upstream {
  zone staging_admin_upstream 64k;
  server frame24-preview-admin:3004 resolve;
}

# Staging API - staging-api.lawtrel.dev
server {
  listen 443 ssl;
  http2 on;
  server_name staging-api.lawtrel.dev;

  ssl_certificate /etc/letsencrypt/live/lawtrel.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lawtrel.dev-0001/privkey.pem;

  client_max_body_size 50m;

  location / {
    proxy_pass http://staging_api_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}

# Staging Admin - staging-admin.lawtrel.dev
server {
  listen 443 ssl;
  http2 on;
  server_name staging-admin.lawtrel.dev;

  ssl_certificate /etc/letsencrypt/live/lawtrel.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lawtrel.dev-0001/privkey.pem;

  client_max_body_size 50m;

  location /v1/ {
    proxy_pass http://staging_api_upstream/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://staging_api_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://staging_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

