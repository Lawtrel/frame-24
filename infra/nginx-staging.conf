# nginx-staging.conf
# Subdomínios de staging para o ambiente /opt/frame24-staging/.
# Copiado para /etc/nginx/conf.d/staging.conf no container frame24-nginx.
#
# Containers esperados:
#   - frame24-staging-api    -> :4000
#   - frame24-staging-web    -> :3000
#   - frame24-staging-admin  -> :3004

resolver 127.0.0.11 ipv6=off valid=10s;

upstream staging_api_upstream {
  zone staging_api_upstream 64k;
  server frame24-staging-api:4000 resolve;
}

upstream staging_web_upstream {
  zone staging_web_upstream 64k;
  server frame24-staging-web:3000 resolve;
}

upstream staging_admin_upstream {
  zone staging_admin_upstream 64k;
  server frame24-staging-admin:3004 resolve;
}

# Staging Web - test.lawtrel.dev
server {
  listen 443 ssl;
  http2 on;
  server_name test.lawtrel.dev;

  ssl_certificate /etc/letsencrypt/live/lawtrel.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lawtrel.dev-0001/privkey.pem;

  client_max_body_size 50m;

  location /v1/ {
    proxy_pass http://staging_api_upstream/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /api/ {
    proxy_pass http://staging_api_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }

  location /storage/ {
    proxy_pass http://minio_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://staging_web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# Staging Admin - test-admin.lawtrel.dev
server {
  listen 443 ssl;
  http2 on;
  server_name test-admin.lawtrel.dev;

  ssl_certificate /etc/letsencrypt/live/lawtrel.dev-0001/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/lawtrel.dev-0001/privkey.pem;

  client_max_body_size 50m;

  location /v1/ {
    proxy_pass http://staging_api_upstream/v1/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /api/ {
    proxy_pass http://staging_api_upstream/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location /storage/ {
    proxy_pass http://minio_upstream/;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }

  location / {
    proxy_pass http://staging_admin_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
  }
}

# HTTP -> HTTPS redirects
server {
  listen 80;
  server_name test.lawtrel.dev test-admin.lawtrel.dev;

  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  location / {
    return 301 https://$host$request_uri;
  }
}
