services:
  postgres:
    image: postgres:18.3-alpine
    container_name: frame24-postgres
    environment:
      POSTGRES_USER: frame24
      POSTGRES_PASSWORD: frame24pass
      POSTGRES_DB: frame24
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frame24"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    container_name: frame24-mailpit
    ports:
      - "${MAILPIT_SMTP_HOST_PORT:-1025}:1025"
      - "${MAILPIT_UI_HOST_PORT:-8025}:8025"
    networks:
      - frame24-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--spider", "-S", "http://localhost:8025/livez"]
      interval: 30s
      timeout: 10s
      retries: 3

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: frame24-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: frame24
      RABBITMQ_DEFAULT_PASS: frame24pass
    ports:
      - "${RABBITMQ_HOST_PORT:-5672}:5672"
      - "${RABBITMQ_UI_HOST_PORT:-15672}:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5

  redis:
    image: redis:8.6.2-alpine
    container_name: frame24-redis
    restart: unless-stopped
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command:
      [
        "redis-server",
        "--appendonly",
        "yes",
        "--requirepass",
        "${REDIS_PASSWORD:-frame24redis}",
        "--maxmemory",
        "256mb",
        "--maxmemory-policy",
        "allkeys-lru",
      ]
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: frame24-minio
    restart: unless-stopped
    user: root
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-frame24-storage-key}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-frame24-storage-secret-2026}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_HOST_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6

  pgbouncer:
    image: edoburu/pgbouncer:latest
    container_name: frame24-pgbouncer
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://frame24:frame24pass@postgres:5432/frame24"
      DB_USER: frame24
      DB_PASSWORD: frame24pass
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: frame24
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 100
      DEFAULT_POOL_SIZE: 25
      RESERVE_POOL_SIZE: 10
      RESERVE_POOL_TIMEOUT: 3
      SERVER_IDLE_TIMEOUT: 300
      ADMIN_USERS: frame24
      AUTH_TYPE: scram-sha-256
    ports:
      - "${PGBOUNCER_HOST_PORT:-6432}:5432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - frame24-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h localhost -p 5432 -U frame24 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  rabbitmq_data:
  redis_data:
  minio_data:

networks:
  frame24-network:
    driver: bridge
