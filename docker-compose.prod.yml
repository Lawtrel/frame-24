services:
  api:
    build:
      context: .
      dockerfile: apps/api/dockerfile
    container_name: frame24-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 4000
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_DB: 0
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: frame24
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: "false"
      MINIO_BUCKET: frame24-uploads
      MINIO_REGION: us-east-1
      JWT_AUDIENCE: frame24-api
      JWT_ISSUER: frame24-api
      JWT_EXPIRES_IN: 8h
      WORKER_ID: 1
      TENANT_BASE_DOMAIN: ${TENANT_BASE_DOMAIN:-lawtrel.dev}
    ports:
      - "4000:4000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -S -O /dev/null http://127.0.0.1:4000/api/v1/public/tenants/resolve?host=health 2>&1 | grep -q 'HTTP/1.1' || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - frame24-network

  web:
    build:
      context: .
      dockerfile: apps/web/dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
        NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-lawtrel.dev}
    container_name: frame24-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_SOCKET_URL: ${NEXT_PUBLIC_SOCKET_URL}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-lawtrel.dev}
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - frame24-network

  landing-page:
    build:
      context: .
      dockerfile: apps/landing-page/dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    container_name: frame24-landing-page
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    ports:
      - "3003:3003"
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3003/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - frame24-network

  admin:
    build:
      context: .
      dockerfile: apps/admin/dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
        NEXT_PUBLIC_TMDB_API_KEY: ${NEXT_PUBLIC_TMDB_API_KEY}
        NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-lawtrel.dev}
        NEXT_PUBLIC_DEFAULT_TENANT_SLUG: ${NEXT_PUBLIC_DEFAULT_TENANT_SLUG:-lawtrel-admin}
    container_name: frame24-admin
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_AUTH_URL: ${NEXT_PUBLIC_AUTH_URL}
      NEXT_PUBLIC_TMDB_API_KEY: ${NEXT_PUBLIC_TMDB_API_KEY}
      NEXT_PUBLIC_TENANT_BASE_DOMAIN: ${NEXT_PUBLIC_TENANT_BASE_DOMAIN:-lawtrel.dev}
      NEXT_PUBLIC_DEFAULT_TENANT_SLUG: ${NEXT_PUBLIC_DEFAULT_TENANT_SLUG:-lawtrel-admin}
      AUTH_INTERNAL_URL: http://api:4000
    ports:
      - "3004:3004"
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3004/ || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
      start_period: 60s
    networks:
      - frame24-network

  postgres:
    image: postgres:16-alpine
    container_name: frame24-postgres
    restart: unless-stopped
    shm_size: 128m
    command:
      - postgres
      - -c
      - max_connections=100
      - -c
      - shared_buffers=256MB
      - -c
      - effective_cache_size=768MB
      - -c
      - work_mem=4MB
      - -c
      - maintenance_work_mem=64MB
      - -c
      - random_page_cost=1.1
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - wal_compression=on
      - -c
      - max_wal_size=1GB
      - -c
      - min_wal_size=80MB
      - -c
      - autovacuum=on
      - -c
      - autovacuum_naptime=10s
      - -c
      - log_min_duration_statement=500
      - -c
      - log_checkpoints=on
      - -c
      - log_connections=off
      - -c
      - log_disconnections=off
    environment:
      POSTGRES_USER: frame24
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: frame24
    volumes:
      - frame-24_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U frame24 -d frame24"]
      interval: 10s
      timeout: 5s
      retries: 6
    networks:
      - frame24-network

  redis:
    image: redis:8-alpine
    container_name: frame24-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - frame24-network

  rabbitmq:
    image: rabbitmq:4.2.4-management-alpine
    container_name: frame24-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: frame24
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    networks:
      - frame24-network

  minio:
    image: alpine/minio:RELEASE.2025-10-15T17-29-55Z
    container_name: frame24-minio
    restart: unless-stopped
    user: root
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:9000/minio/health/live || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 6
    networks:
      - frame24-network

  nginx:
    image: nginx:alpine
    container_name: frame24-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/frame24-staging/infra/nginx-staging.conf:/etc/nginx/conf.d/staging.conf:ro
      - /var/www/certbot:/var/www/certbot:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      admin:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
        reservations:
          memory: 32M
    networks:
      - frame24-network

volumes:
  frame-24_postgres_data:
    external: true
  redis_data:
  rabbitmq_data:
  minio_data:

networks:
  frame24-network:
    driver: bridge
